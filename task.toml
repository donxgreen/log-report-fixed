artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"

model_tested = "GPT-5.4"
agent_tested = "Terminus-2"

task_objective = ["analyze", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]

expert_time_estimate_hours = 0.3

difficulty_explanation = "The task requires correctly parsing an Apache-style access log, counting requests, counting unique client IP addresses, and identifying the most frequently requested path."

solution_explanation = "Read the access log, aggregate request counts, count unique IP addresses, determine the most frequently requested path, and write the results to report.json."

verification_explanation = "The verifier loads report.json and validates the required fields and exact values derived from the provided access log."

